x-db-environment: &x-db-environment
  MYSQL_DATABASE: "article"
  MYSQL_USER: "user"
  MYSQL_PASSWORD: "dbpassword123"
  MYSQL_ROOT_PASSWORD: "rootpassword123"

x-backend-app-environment: &x-backend-app-environment
  GOMAXPROCS: "1"
  APP_NAME: "go-post-article"
  APP_VERSION: "1.0.0"
  HTTP_PORT: "8080"
  LOG_LEVEL: "debug"
  SWAGGER_ENABLED: "true"
  MYSQL_POOL_MAX: "2"
  MYSQL_URL: "mysql://user:dbpassword123@tcp(db-article:3306)/article?parseTime=true"

services:
  db:
    container_name: db-article
    image: mysql:9.0
    environment:
      <<: *x-db-environment
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      app_network:
        aliases:
          - db-article.lvh.me

  app:
    container_name: app-article
    platform: linux/amd64
    pid: "host"
    build:
      context: .
    environment:
      <<: *x-backend-app-environment
    ports:
      - "8080:8080"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: "2Gb"
        reservations:
          cpus: "0.60"
          memory: "1Gb"
    networks:
      app_network:
        aliases:
          - app.lvh.me

networks:
  app_network:
    external: false

volumes:
  db_data:
