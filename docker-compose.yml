x-db-environment: &x-db-environment
  MYSQL_DATABASE: "article"
  MYSQL_USER: "user"
  MYSQL_PASSWORD: "dbpassword123"
  MYSQL_ROOT_PASSWORD: "rootpassword123"

services:
  db:
    container_name: db-article
    image: mysql:9.0
    environment:
      <<: *x-db-environment
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      app_network:
        aliases:
          - db-article.lvh.me

networks:
  app_network:
    external: false

volumes:
  db_data:
